name: Build Android

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Build APK (universal)
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

      - name: Build AppBundle (Google Play)
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/debug-info

      - name: Rename artifacts
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d+ -f1)
          cp build/app/outputs/flutter-apk/app-release.apk "cloudora-v${VERSION}.apk"
          cp build/app/outputs/bundle/release/app-release.aab "cloudora-v${VERSION}.aab"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cloudora-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: cloudora-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cloudora-v*.apk
            cloudora-v*.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
